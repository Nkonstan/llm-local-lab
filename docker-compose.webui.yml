# ── Open WebUI ───────────────────────────────────────────────────────────────
# Full-featured chat interface. Optional — use alongside the base compose.
# Usage (standalone):  make gpu-webui  /  make cpu-webui
# Usage (manual):      docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f docker-compose.webui.yml up -d

services:
  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-in-production}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
    volumes:
      - webui_data:/app/backend/data
    restart: unless-stopped

volumes:
  webui_data:
    driver: local
