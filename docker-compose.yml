services:

  # ── Inference backend ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      # Allow browser requests from any local UI port
      - OLLAMA_ORIGINS=${OLLAMA_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Model bootstrap ───────────────────────────────────────────────────────────
  model-init:
    image: ollama/ollama:latest
    container_name: model-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "${DEFAULT_MODEL:-qwen3:2b}"]
    restart: "no"

volumes:
  ollama_data:
    driver: local
